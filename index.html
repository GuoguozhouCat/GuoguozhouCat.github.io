<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>我的私人歌单</title>
    <style>
        * {margin:0;padding:0;box-sizing:border-box;font-family:system-ui, sans-serif}
        body {background:#f8f9fa;padding:20px 12px;max-width:1200px;margin:0 auto}
        .header {margin-bottom:24px}
        h1 {color:#222;margin-bottom:6px;font-size:22px}
        .update-info {color:#666;font-size:14px;margin-bottom:10px}
        table {width:100%;border-collapse:collapse;background:#fff;border-radius:10px;overflow:hidden;box-shadow:0 2px 12px rgba(0,0,0,0.06)}
        th,td {padding:12px 10px;text-align:left;border-bottom:1px solid #eee;font-size:15px}
        th {background:#f0f2f5;color:#333}
        tr:hover {background:#f7f8fa}
        @media (max-width:768px) {th,td {padding:10px 6px;font-size:13px}}
    </style>
</head>
<body>
    <div class="header">
        <h1>栖苑太困辽 与她的</h1>
        <div class="update-info">共 <span id="songTotal">0</span> 首歌 | 最后更新：2026-02-22 15:17:25</div>
    </div>

    <table>
        <thead>
            <tr>
                <th>序号</th>
                <th>歌曲名称</th>
                <th>歌手</th>
                <th>语言</th>
                <th>风格</th>
                <th>切片</th>
            </tr>
        </thead>
        <tbody id="songList"></tbody>
    </table>

<script>
// ========== 在这里替换你的全部歌曲数据 ==========
const songData = [
    {"name":"走不出这大雨","singer":"单循","lang":"中文","style":"流行","slice":"未切"},
    {"name":"Pretender","singer":"Official髭男dism","lang":"日语","style":"流行","slice":"未切"},
    {"name":"絮咏歌","singer":"司南","lang":"中文","style":"国风","slice":"未切"},
    {"name":"鸳鸯戏","singer":"Babystop_山竹、伊笑","lang":"中文","style":"国风","slice":"未切"},
    {"name":"离开我的依赖","singer":"王艳薇","lang":"中文","style":"流行；苦情","slice":"未切"}
    // 把你文档里50首全部按这个格式复制进来即可
];

// 自动渲染表格
function renderList() {
    const listDom = document.getElementById("songList");
    document.getElementById("songTotal").innerText = songData.length;
    let html = "";
    songData.forEach((item, idx) => {
        html += `
        <tr>
            <td>${idx+1}</td>
            <td>${item.name}</td>
            <td>${item.singer}</td>
            <td>${item.lang}</td>
            <td>${item.style}</td>
            <td>${item.slice}</td>
        </tr>
        `
    })
    listDom.innerHTML = html;
}
renderList();
</script>
</body>
</html>
